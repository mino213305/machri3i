<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>GAIA - لوحة التقييم</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fdfbf7; text-align: center; padding: 20px; }
        .waiter-btn { background: #fff; border: 1px solid #ddd; padding: 20px; margin: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .waiter-btn:hover, .waiter-btn.selected { background: #e0d8c3; border-color: #c0b090; }
        .stars { font-size: 30px; cursor: pointer; color: #ccc; }
        .stars span.active { color: #ffcc00; }
    </style>
</head>
<body>
    <h1>مرحباً بك ولد القحبة</h1>
    <p>يرجى اختيار النادل نكمك:</p>
    <div id="waiters">
        <!-- أزرار النوادل -->
        <button class="waiter-btn" onclick="selectWaiter(this)">أحمد</button>
        <button class="waiter-btn" onclick="selectWaiter(this)">عمر</button>
        <button class="waiter-btn" onclick="selectWaiter(this)">سارة</button>
        <button class="waiter-btn" onclick="selectWaiter(this)">ليلى</button>
        <button class="waiter-btn" onclick="selectWaiter(this)">خالد</button>
        <button class="waiter-btn" onclick="selectWaiter(this)">مريم</button>
    </div>
    <h3>قيم تجربتك:</h3>
    <div class="stars" id="star-rating">
        <span onclick="rate(1)">★</span><span onclick="rate(2)">★</span>
        <span onclick="rate(3)">★</span><span onclick="rate(4)">★</span><span onclick="rate(5)">★</span>
    </div>

    <script>
        function selectWaiter(btn) {
            document.querySelectorAll('.waiter-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
        function rate(stars) {
            let spans = document.querySelectorAll('#star-rating span');
            spans.forEach((s, i) => s.classList.toggle('active', i < stars));
        }
    </script>
    <h1>تم التحديث بنجاح يالعطاي نقش!</h1>
</body>
</html>
