<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تقييم النوادل - GAIA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfbf7; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        h1 { color: #333; }
        .waiters-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .waiter-card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stars { margin-top: 10px; cursor: pointer; color: #ffcc00; font-size: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>مرحباً بك في GAIA</h1>
        <p>يرجى اختيار النادل لتقييم خدمته:</p>
        <div class="waiters-grid">
            <div class="waiter-card">أحمد</div>
            <div class="waiter-card">عمر</div>
            <div class="waiter-card">سارة</div>
            <div class="waiter-card">ليلى</div>
            <div class="waiter-card">خالد</div>
            <div class="waiter-card">مريم</div>
        </div>
        <h3>قيم تجربتك:</h3>
        <div class="stars">★★★★★</div>
    </div>
</body>
</html>
