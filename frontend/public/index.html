<!DOCTYPE html>
<html>
<body>

    <h2>لوحة تحكم المطعم</h2>
    <div id="stats">التقييم الحالي: 4.8 نجوم</div>

    <button onclick="clearRatings()" style="background-color: red; color: white; padding: 15px; border: none; cursor: pointer;">
        مسح جميع التقييمات
    </button>

    <script>
        function clearRatings() {
            if (confirm('هل أنت متأكد من مسح جميع التقييمات؟')) {
                localStorage.clear(); // هذا الأمر يقوم بحذف البيانات فوراً
                alert('تم مسح البيانات بنجاح!');
                location.reload(); // تحديث الصفحة لتظهر اللوحة فارغة
            }
        }
    </script>

</body>
</html>
